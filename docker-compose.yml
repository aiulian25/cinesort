services:
  cinesort:
    image: aiulian25/cinesort:latest
    container_name: cinesort
    ports:
      - "8888:8888"
    environment:
      # User/Group IDs for file permissions (match your host user)
      # Run 'id -u' and 'id -g' on your host to get your IDs
      - PUID=1000
      - PGID=1000
      
      # Optional: Custom TMDb API key (get yours at https://www.themoviedb.org/settings/api)
      # Required for TV + movie metadata. Without it the TMDb source is disabled.
      # - TMDB_API_KEY=your_tmdb_api_key_here

      # Optional: OMDb API key — enables IMDb data + adult-title fallback
      # Free tier: 1,000 requests/day. Get yours at https://www.omdbapi.com/apikey.aspx
      # Without this key the OMDb source is silently disabled.
      # - OMDB_API_KEY=your_omdb_api_key_here

      # Optional: TMDb metadata language for the titles/overviews used in
      # filenames (ISO code, e.g. de-DE, ro-RO). Empty/unset = English.
      # TVmaze and OMDb are English-only. Can also be set in the app Settings.
      # - TMDB_LANGUAGE=de-DE
      
      # Server configuration (usually no need to change these)
      - CINESORT_HOST=0.0.0.0
      - CINESORT_PORT=8888

      # Optional: extra folders the in-app file browser may expose, in addition
      # to /mnt and /media (os.pathsep / ":"-separated). Only add paths you also
      # mount as volumes below. Used as quick-access "Shortcuts" in the browser.
      # - CINESORT_BROWSE_ROOTS=/media/movies:/media/tv:/media/downloads
    
    volumes:
      # Persistent data: rename/undo history AND API keys saved from the
      # Settings UI (the image sets CINESORT_DATA_DIR=/data). Both survive
      # container recreation and image upgrades. Env vars above still take
      # precedence over UI-saved keys.
      - cinesort-data:/data
      
      # Media directories - CHANGE THESE to match your system!
      # Example: Mount your movies and TV shows directories
      # Single directory:
      - /path/to/your/media:/media
      
      # Or mount multiple specific directories:
      # - /path/to/movies:/media/movies
      # - /path/to/tv:/media/tv
      # - /path/to/downloads:/media/downloads
      
      # For network mounts (NFS/SMB), add :rw flag:
      # - /mnt/nas:/media:rw
    
    restart: unless-stopped
    
    # Optional: Resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 1G
    #     reservations:
    #       memory: 256M
    
    # Optional: Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cinesort-data:
    driver: local
